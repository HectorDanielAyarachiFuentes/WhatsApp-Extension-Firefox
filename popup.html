<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>WhatsApp - Mensajes</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup-container">
    <div id="header">
      <span id="header-icon">💬</span>
      <span id="header-title">Mensajes no leídos</span>
      <span id="header-count"></span>
    </div>

    <div id="tabs-container"></div>

    <div id="preview-container">
      <div id="preview-empty">
        <p>Sin mensajes nuevos 🎉</p>
      </div>
    </div>

    <button id="open-whatsapp">
      <span>Abrir WhatsApp</span>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
